<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Of Walking on Foot — Iceland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --ink: #1a1612;
  --paper: #f4f0e8;
  --paper2: #ede8dc;
  --border: #c8bfa8;
  --accent: #2d5a8e;
  --accent2: #7a4f2d;
  --cold: #4a7fa5;
  --muted: #7a7060;
  --red: #8e3a2d;
  --green: #3a6e4a;
  --font-serif: 'Cormorant Garamond', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-serif);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  position: relative;
}

/* grain texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ── HEADER ── */
#masthead {
  border-bottom: 2px solid var(--ink);
  padding: 24px 32px 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

#title-block h1 {
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 300;
  letter-spacing: 0.02em;
  line-height: 1.1;
  font-style: italic;
}

#title-block h1 strong {
  font-weight: 600;
  font-style: normal;
  display: block;
  font-size: 0.65em;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

#live-status {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  flex-wrap: wrap;
  justify-content: flex-end;
}

.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
  animation: blink 2s infinite;
}
.live-dot.ok { background: var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

#btn-refresh {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: all .2s;
}
#btn-refresh:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── STATS BAR ── */
#stats-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.stat-cell {
  flex: 1;
  min-width: 100px;
  padding: 12px 20px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.stat-cell:last-child { border-right: none; }
.stat-num {
  font-size: 26px;
  font-weight: 300;
  color: var(--accent);
  display: block;
  line-height: 1;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  margin-top: 4px;
  display: block;
}

/* ── MAIN LAYOUT ── */
#layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  min-height: calc(100vh - 140px);
}

@media (max-width: 900px) {
  #layout { grid-template-columns: 1fr; }
  #map-col { height: 50vh; }
}

/* ── MAP ── */
#map-col {
  position: sticky;
  top: 0;
  height: 100vh;
  border-right: 1px solid var(--border);
}

#map {
  width: 100%;
  height: 100%;
}

/* Leaflet overrides */
.leaflet-container { font-family: var(--font-serif); background: #e8e4d8; }
.leaflet-popup-content-wrapper {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
  font-family: var(--font-serif);
}
.leaflet-popup-tip { background: var(--paper); }
.leaflet-popup-content { margin: 12px 16px; min-width: 200px; }

.popup-time { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.popup-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.popup-row { font-size: 12px; color: var(--muted); margin: 2px 0; }
.popup-row span { color: var(--ink); font-weight: 500; }

/* custom markers */
.day-marker {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid white;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: white;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}

.latest-marker {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--red);
  border: 3px solid white;
  box-shadow: 0 0 0 3px rgba(142,58,45,.3);
  animation: ping 2s infinite;
}
@keyframes ping {
  0%,100% { box-shadow: 0 0 0 3px rgba(142,58,45,.3); }
  50% { box-shadow: 0 0 0 8px rgba(142,58,45,.1); }
}

/* ── LOG PANEL ── */
#log-col {
  overflow-y: auto;
  max-height: 100vh;
  position: sticky;
  top: 0;
}

#log-header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 10;
}

#log-header h2 {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

/* DAY GROUP */
.day-group { border-bottom: 2px solid var(--border); }

.day-heading {
  padding: 14px 20px 10px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  background: var(--paper2);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.day-heading:hover { background: #e5e0d2; }

.day-name {
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
}
.day-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  line-height: 1.5;
}
.day-count {
  background: var(--accent);
  color: white;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
}

.day-entries { display: block; }
.day-entries.collapsed { display: none; }

/* ENTRY */
.entry {
  padding: 12px 20px;
  border-bottom: 1px solid #ddd8cc;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.entry:hover { background: #ede8dc; }
.entry:last-child { border-bottom: none; }

.entry-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 5px;
}

.entry-weather {
  font-size: 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.entry-fields {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.field-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--paper);
}

.field-tag.has-val {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(45,90,142,.06);
}

.field-tag.pain-tag {
  border-color: var(--red);
  color: var(--red);
  background: rgba(142,58,45,.06);
}

.entry-note {
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  margin-top: 7px;
  line-height: 1.4;
  border-left: 2px solid var(--border);
  padding-left: 8px;
}

.entry-gps {
  font-family: var(--font-mono);
  font-size: 9px;
  color: #aaa;
  margin-top: 5px;
}

/* FORECAST vs PERCEIVED */
.comparison-block {
  margin-top: 9px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  font-size: 12px;
}
.comparison-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  align-items: center;
  padding: 6px 10px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.comparison-row:last-child { border-bottom: none; }
.comparison-row.forecasted { background: rgba(45,90,142,.04); }
.comparison-row.perceived  { background: rgba(122,79,45,.04); }
.comp-label {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}
.comp-val { color: var(--ink); font-weight: 500; }

/* detail modal comparison */
.detail-comparison {
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 4px;
}
.detail-comp-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  padding: 7px 12px;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.detail-comp-row:last-child { border-bottom: none; }
.detail-comp-row.forecasted { background: rgba(45,90,142,.05); }
.detail-comp-row.perceived  { background: rgba(122,79,45,.05); }
.dc-label {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  align-self: center;
}
.dc-val { color: var(--ink); }

/* ENTRY DETAIL MODAL */
#detail-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,22,18,.7);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#detail-modal.open { display: flex; }

#detail-box {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 8px 8px 0 rgba(0,0,0,.15);
}

#detail-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

#detail-title { font-size: 20px; font-weight: 300; font-style: italic; }
#detail-sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 3px; }

#detail-close {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--muted); flex-shrink: 0;
  line-height: 1;
}

#detail-body { padding: 16px 22px 22px; }

.detail-section { margin-bottom: 18px; }
.detail-section h3 {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 20px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
  border-bottom: 1px dotted #ddd;
}
.detail-row:last-child { border-bottom: none; }
.d-label { color: var(--muted); }
.d-val { font-weight: 500; text-align: right; }

/* SCALE VIZ — icon based */
.scale-icons {
  display: flex;
  gap: 2px;
  align-items: center;
}
.scale-icon {
  font-size: 14px;
  opacity: 0.15;
  line-height: 1;
  transition: opacity .15s;
}
.scale-icon.on { opacity: 1; }

/* EMPTY / LOADING */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 800;
  transition: opacity .5s;
}
#loading-screen.gone { opacity: 0; pointer-events: none; }

.loading-title {
  font-size: 28px;
  font-weight: 300;
  font-style: italic;
  text-align: center;
}
.loading-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .1em;
}
.loading-bar {
  width: 200px; height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}
.loading-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  animation: load 1.5s ease-in-out infinite;
}
@keyframes load { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

/* CONFIG BANNER */
#config-banner {
  display: none;
  background: #fff8e7;
  border: 1px solid #e0c060;
  border-radius: 4px;
  padding: 16px 20px;
  margin: 20px;
  font-size: 14px;
  line-height: 1.6;
}
#config-banner code {
  background: #f0e8cc;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 12px;
}
#config-banner.show { display: block; }

#sheet-url-input {
  width: 100%;
  margin-top: 10px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--paper);
}
#btn-set-url {
  margin-top: 8px;
  padding: 8px 18px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 3px;
  font-family: var(--font-serif);
  font-size: 14px;
  cursor: pointer;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ATTRIBUTION */
#foot {
  text-align: center;
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--border);
  border-top: 1px solid var(--border);
  grid-column: 1/-1;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-title">Of Walking on Foot</div>
  <div class="loading-sub">Iceland · Field Journal</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-sub" id="loading-msg">Loading expedition data…</div>
</div>

<!-- MASTHEAD -->
<div id="masthead">
  <div id="title-block">
    <h1>
      <strong>Field Expedition</strong>
      Of Walking on Foot — Iceland
    </h1>
  </div>
  <div id="live-status">
    <div class="live-dot" id="live-dot"></div>
    <span id="live-label">Connecting…</span>
    <span id="last-update"></span>
    <button id="btn-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div class="stat-cell"><span class="stat-num" id="stat-days">—</span><span class="stat-label">Days</span></div>
  <div class="stat-cell"><span class="stat-num" id="stat-entries">—</span><span class="stat-label">Entries</span></div>
  <div class="stat-cell"><span class="stat-num" id="stat-last-temp">—</span><span class="stat-label">Last Temp</span></div>
  <div class="stat-cell"><span class="stat-num" id="stat-last-pace">—</span><span class="stat-label">Last Pace</span></div>
  <div class="stat-cell"><span class="stat-num" id="stat-last-loc" style="font-size:14px;cursor:pointer" title="View on map"></span><span class="stat-label">Last Location</span></div>
</div>

<!-- MAIN LAYOUT -->
<div id="layout">
  <!-- MAP -->
  <div id="map-col">
    <div id="map"></div>
  </div>

  <!-- LOG -->
  <div id="log-col">
    <div id="log-header">
      <h2>Field Diary</h2>
    </div>
    <div id="log-list"></div>
    <div id="foot">Of Walking on Foot · Iceland · Updates daily at midnight · Refresh manually anytime</div>
  </div>
</div>

<!-- ENTRY DETAIL MODAL -->
<div id="detail-modal" onclick="closeDetail(event)">
  <div id="detail-box">
    <div id="detail-header">
      <div>
        <div id="detail-title">—</div>
        <div id="detail-sub">—</div>
      </div>
      <button id="detail-close" onclick="closeModal()">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────
let SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCXCLzZy5wWJRXZ0AxDVilpS6wbs89MNFw0hxtIyVi_8y6t5m-1qL9I24xqBks8G3JMNZY1B_sAoAX/pub?output=csv';
let allEntries = [];
let map, routeLine, markers = [];
let refreshTimer = null;
let dayColors = {};
const COLOR_PALETTE = [
  '#2d5a8e','#7a4f2d','#3a6e4a','#8e3a2d','#4a7fa5',
  '#6b5a8e','#8e6b2d','#2d8e6b','#8e2d5a','#5a8e2d'
];

// ── INIT ───────────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  loadData();
  scheduleMidnightRefresh();
});


function scheduleMidnightRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0); // next midnight
  const msUntilMidnight = midnight - now;
  refreshTimer = setTimeout(() => {
    loadData();
    scheduleMidnightRefresh(); // reschedule for next midnight
  }, msUntilMidnight);
}
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false });
  // Stamen Toner Lite — clean cartographic look
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  map.setView([64.9631, -19.0208], 6); // Iceland default
}

// ── LOAD DATA ──────────────────────────────────────────
async function loadData() {
  if (!SHEET_CSV_URL) return;
  setLiveStatus('loading');
  document.getElementById('loading-msg').textContent = 'Fetching latest entries…';
  try {
    // Add cache-buster
    const url = SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + '_t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    allEntries = parseCSV(csv);
    render();
    setLiveStatus('ok');
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    setLiveStatus('error');
    document.getElementById('live-label').textContent = 'Error: ' + e.message;
  }
  hideLoading();
}

// ── CSV PARSER ─────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(e => e.Timestamp || e.Date);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  if (!allEntries.length) return;

  // Group by date
  const byDay = {};
  allEntries.forEach(e => {
    const day = e.Date || e.Timestamp?.split('T')[0] || 'Unknown';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });

  const days = Object.keys(byDay).sort();

  // Assign colors per day
  days.forEach((d, i) => { dayColors[d] = COLOR_PALETTE[i % COLOR_PALETTE.length]; });

  // Stats
  document.getElementById('stat-days').textContent = days.length;
  document.getElementById('stat-entries').textContent = allEntries.length;
  const last = allEntries[allEntries.length - 1];
  document.getElementById('stat-last-temp').textContent = last.Temp_C ? last.Temp_C + '°C' : '—';
  document.getElementById('stat-last-pace').textContent = last.Pace || '—';
  const locEl = document.getElementById('stat-last-loc');
  if (last.Latitude && last.Longitude) {
    const lat = parseFloat(last.Latitude).toFixed(5);
    const lon = parseFloat(last.Longitude).toFixed(5);
    locEl.innerHTML = `<a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:13px">📍 View on map</a>`;
  } else {
    locEl.textContent = '—';
  }

  // Render map
  renderMap(byDay, days);

  // Render log
  renderLog(byDay, days);
}

// ── MAP RENDER ─────────────────────────────────────────
function renderMap(byDay, days) {
  // Clear old layers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }

  const allCoords = [];

  days.forEach((day, dayIdx) => {
    const entries = byDay[day];
    const color = dayColors[day];
    const dayCoords = [];

    entries.forEach((e, entryIdx) => {
      const lat = parseFloat(e.Latitude);
      const lon = parseFloat(e.Longitude);
      if (isNaN(lat) || isNaN(lon)) return;
      dayCoords.push([lat, lon]);
      allCoords.push([lat, lon]);

      const isLatest = dayIdx === days.length - 1 && entryIdx === entries.length - 1;

      let marker;
      if (isLatest) {
        // Pulsing dot for latest position
        const icon = L.divIcon({
          className: '',
          html: `<div class="latest-marker"></div>`,
          iconSize: [14, 14], iconAnchor: [7, 7]
        });
        marker = L.marker([lat, lon], { icon, zIndexOffset: 1000 });
      } else {
        const icon = L.divIcon({
          className: '',
          html: `<div class="day-marker" style="background:${color}">${dayIdx + 1}</div>`,
          iconSize: [28, 28], iconAnchor: [14, 14]
        });
        marker = L.marker([lat, lon], { icon });
      }

      // Popup
      const weather = e.Weather_Auto || e.Weather || '';
      const temp = e.Temp_C ? `${e.Temp_C}°C` : '';
      marker.bindPopup(`
        <div class="popup-time">${e.Date || ''} · ${e.Time || ''}</div>
        <div class="popup-title">${weather} ${temp}</div>
        ${e.Terrain ? `<div class="popup-row">Terrain: <span>${e.Terrain}</span></div>` : ''}
        ${e.Pace ? `<div class="popup-row">Pace: <span>${e.Pace}</span></div>` : ''}
        ${e.Note ? `<div class="popup-row" style="font-style:italic;margin-top:6px">"${e.Note}"</div>` : ''}
      `);

      marker.on('click', () => openDetail(e));
      marker.addTo(map);
      markers.push(marker);
    });

    // Day route line
    if (dayCoords.length > 1) {
      const line = L.polyline(dayCoords, {
        color, weight: 2.5, opacity: 0.7, dashArray: null
      }).addTo(map);
      markers.push(line);
    }
  });

  // Connect days with dashed line
  if (allCoords.length > 1) {
    routeLine = L.polyline(allCoords, {
      color: '#888', weight: 1, opacity: 0.3, dashArray: '4 6'
    }).addTo(map);
  }

  // Fit map
  if (allCoords.length > 0) {
    if (allCoords.length === 1) {
      map.setView(allCoords[0], 13);
    } else {
      map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
    }
  }
}

// ── LOG RENDER ─────────────────────────────────────────
function renderLog(byDay, days) {
  const list = document.getElementById('log-list');
  list.innerHTML = '';

  // Reverse: most recent day first
  [...days].reverse().forEach((day, di) => {
    const entries = byDay[day];
    const color = dayColors[day];
    const dayNum = days.indexOf(day) + 1;
    const lastEntry = entries[entries.length - 1];
    const weatherSummary = lastEntry.Weather_Auto || lastEntry.Weather || '';

    const group = document.createElement('div');
    group.className = 'day-group';

    const heading = document.createElement('div');
    heading.className = 'day-heading';
    heading.innerHTML = `
      <div>
        <div class="day-name" style="color:${color}">Day ${dayNum}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${formatDate(day)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="day-count" style="background:${color}">${entries.length}</span>
        <div class="day-meta">
          ${weatherSummary}<br>
          ${lastEntry.Terrain || ''}
        </div>
      </div>`;

    const entriesDiv = document.createElement('div');
    entriesDiv.className = 'day-entries' + (di === 0 ? '' : ' collapsed');

    heading.onclick = () => entriesDiv.classList.toggle('collapsed');
    group.appendChild(heading);

    // Entries — most recent first within day
    [...entries].reverse().forEach(e => {
      const el = document.createElement('div');
      el.className = 'entry';
      el.onclick = () => openDetail(e);

      const weatherIcon = getWeatherIcon(e.Weather_Auto || e.Weather || '');
      const temp = e.Temp_C ? `${e.Temp_C}°C` : '';

      // Build field tags
      const fieldTags = buildFieldTags(e);

      const lat = e.Latitude ? parseFloat(e.Latitude).toFixed(5) : null;
      const lon = e.Longitude ? parseFloat(e.Longitude).toFixed(5) : null;
      const locationHTML = lat ? `<div class="entry-gps"><a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" style="color:var(--accent);text-decoration:none">📍 View location</a></div>` : '';

      // Wind comparison
      const windCompHTML = (e.Wind_Scale && e.Wind_ms) ? `
        <div class="comparison-block" style="margin-top:8px">
          <div class="comparison-row forecasted">
            <span class="comp-label">🌬 Forecasted</span>
            <span class="comp-val">${e.Wind_ms} m/s</span>
          </div>
          <div class="comparison-row perceived">
            <span class="comp-label">🧍 Perceived</span>
            <span class="comp-val">${scaleLabel('Wind_Scale', e.Wind_Scale)}</span>
          </div>
        </div>` : '';

      // Weather/temp comparison
      const weatherCompHTML = (e.Weather && e.Weather_Auto) ? `
        <div class="comparison-block" style="margin-top:6px">
          <div class="comparison-row forecasted">
            <span class="comp-label">📡 Forecasted</span>
            <span class="comp-val">${e.Weather_Auto}${e.Feels_C ? ' · feels ' + e.Feels_C + '°C' : ''}</span>
          </div>
          <div class="comparison-row perceived">
            <span class="comp-label">🧍 Perceived</span>
            <span class="comp-val">${e.Weather}${e.Cold ? ' · Cold: ' + scaleLabel('Cold', e.Cold) : ''}</span>
          </div>
        </div>` : '';

      el.innerHTML = `
        <div class="entry-time">${e.Time || ''}</div>
        <div class="entry-weather">${weatherIcon} ${e.Weather_Auto || e.Weather || '—'} ${temp}</div>
        <div class="entry-fields">${fieldTags}</div>
        ${windCompHTML}
        ${weatherCompHTML}
        ${e.Note ? `<div class="entry-note">${e.Note}</div>` : ''}
        ${locationHTML}
      `;
      entriesDiv.appendChild(el);
    });

    group.appendChild(entriesDiv);
    list.appendChild(group);
  });
}

// Scale label maps — what numbers mean in human terms
const SCALE_LABELS = {
  Tiredness:     {1:'Fresh',      2:'Slightly tired', 3:'Tired',    4:'Very tired',   5:'Exhausted'},
  Sleep_Quality: {1:'Terrible',   2:'Poor',           3:'Okay',     4:'Good',         5:'Excellent'},
  Cold:          {1:'Warm',       2:'Cool',           3:'Cold',     4:'Very cold',    5:'Freezing'},
  Solitude:      {1:'Surrounded', 2:'Few people',     3:'Quiet',    4:'Very alone',   5:'Total solitude'},
  Trolley:       {1:'Very light', 2:'Light',          3:'Medium',   4:'Heavy',        5:'Very heavy'},
  Wind_Scale:    {1:'Calm',       2:'Light breeze',   3:'Windy',    4:'Very windy',   5:'Storm force'},
};

// Icon per scale field
const SCALE_ICONS = {
  Tiredness:     '😴',
  Sleep_Quality: '🌙',
  Cold:          '🥶',
  Solitude:      '🚶',
  Trolley:       '🧳',
  Wind_Scale:    '💨',
};

function renderScaleIcons(field, val) {
  const n = parseInt(val);
  if (isNaN(n)) return val;
  const icon = SCALE_ICONS[field] || '●';
  const label = SCALE_LABELS[field] && SCALE_LABELS[field][n] ? SCALE_LABELS[field][n] : `${n}/5`;
  let html = `<span style="display:inline-flex;align-items:center;gap:3px">`;
  for (let i = 1; i <= 5; i++) {
    html += `<span class="scale-icon${i <= n ? ' on' : ''}">${icon}</span>`;
  }
  html += `<span style="margin-left:5px;font-size:11px;color:var(--muted)">${label}</span>`;
  html += `</span>`;
  return html;
}
  const v = parseFloat(ms);
  if (isNaN(v)) return '';
  if (v < 0.3) return 'Calm';
  if (v < 1.6) return 'Light air';
  if (v < 3.4) return 'Light breeze';
  if (v < 5.5) return 'Gentle breeze';
  if (v < 8.0) return 'Moderate breeze';
  if (v < 10.8) return 'Fresh breeze';
  if (v < 13.9) return 'Strong breeze';
  if (v < 17.2) return 'Near gale';
  if (v < 20.8) return 'Gale';
  if (v < 24.5) return 'Severe gale';
  if (v < 28.5) return 'Storm';

  if (isNaN(n)) return val;
  const map = SCALE_LABELS[field];

}

function buildFieldTags(e) {
  const skip = new Set(['Timestamp','Date','Time','Latitude','Longitude','GPS_Acc_m','Weather_Auto','Temp_C','Feels_C','Wind_ms','Precip_mm','Note','_synced','Weather']);
  let html = '';
  const fields = [
    {k:'Tiredness',    label:'Tiredness',     scale:true},
    {k:'Sleep_Quality',label:'Sleep',         scale:true},
    {k:'Cold',         label:'Cold',          scale:true},
    {k:'Wind_Scale',   label:'Wind',          scale:true},
    {k:'Solitude',     label:'Solitude',      scale:true},
    {k:'Trolley',      label:'Trolley',       scale:true},
    {k:'Hunger',       label:'Hunger',        scale:false},
    {k:'Thirst',       label:'Thirst',        scale:false},
    {k:'Trance',       label:'Trance',        scale:false},
    {k:'Mental_Loop',  label:'Mental Loop',   scale:false},
    {k:'Pace',         label:'Pace',          scale:false},
    {k:'Skin',         label:'Skin',          scale:false},
    {k:'Terrain',      label:'Terrain',       scale:false},
    {k:'Pain',         label:'Pain',          scale:false},
    {k:'Animals',      label:'Animals',       scale:false},
    {k:'Humans',       label:'Humans',        scale:false},
    {k:'Camping_Plot', label:'Camp',          scale:false},
  ];
  fields.forEach(({k, label, scale}) => {
    const v = e[k];
    if (!v) return;
    const isPain = k === 'Pain';
    const cls = isPain ? 'field-tag pain-tag' : 'field-tag has-val';
    if (scale && SCALE_ICONS[k] && !isNaN(parseInt(v))) {
      const n = parseInt(v);
      const icon = SCALE_ICONS[k];
      const humanLabel = SCALE_LABELS[k] && SCALE_LABELS[k][n] ? SCALE_LABELS[k][n] : `${n}/5`;
      let icons = '';
      for (let i = 1; i <= 5; i++) {
        icons += `<span style="opacity:${i<=n?'1':'0.15'}">${icon}</span>`;
      }
      html += `<span class="${cls}" style="display:inline-flex;align-items:center;gap:3px;padding:4px 8px" title="${label}: ${humanLabel}">${icons}<span style="margin-left:4px;font-size:9px">${label}</span></span>`;
    } else {
      const display = scale ? scaleLabel(k, v) : v;
      html += `<span class="${cls}">${label}: ${display}</span>`;
    }
  });
  // Custom fields
  Object.entries(e).forEach(([k,v]) => {
    if (!v || skip.has(k) || fields.find(f=>f.k===k)) return;
    html += `<span class="field-tag has-val">${k.replace(/_/g,' ')}: ${v}</span>`;
  });
  return html || '<span class="field-tag">no field data</span>';
}

// ── DETAIL MODAL ───────────────────────────────────────
function openDetail(e) {
  const modal = document.getElementById('detail-modal');
  const weatherIcon = getWeatherIcon(e.Weather_Auto || e.Weather || '');

  document.getElementById('detail-title').textContent = `${weatherIcon} ${e.Weather_Auto || e.Weather || 'Entry'}`;
  document.getElementById('detail-sub').textContent = `${e.Date || ''} · ${e.Time || ''} · ${e.Latitude ? parseFloat(e.Latitude).toFixed(4)+', '+parseFloat(e.Longitude).toFixed(4) : 'No GPS'}`;

  const body = document.getElementById('detail-body');

  // Build sections
  const physical = [
    ['Tiredness',     e.Tiredness,     true,  'Tiredness'],
    ['Sleep Quality', e.Sleep_Quality, true,  'Sleep_Quality'],
    ['Cold',          e.Cold,          true,  'Cold'],
    ['Solitude',      e.Solitude,      true,  'Solitude'],
    ['Trolley Weight',e.Trolley,       true,  'Trolley'],
    ['Wind Scale',    e.Wind_Scale,    true,  'Wind_Scale'],
    ['Hunger',        e.Hunger,        false, null],
    ['Thirst',        e.Thirst,        false, null],
    ['Trance',        e.Trance,        false, null],
    ['Mental Loop',   e.Mental_Loop,   false, null],
    ['Skin',          e.Skin,          false, null],
    ['Pace',          e.Pace,          false, null],
    ['Pain',          e.Pain,          false, null],
  ].filter(([,v]) => v);

  const environment = [
    ['Terrain', e.Terrain],
    ['Animals', e.Animals],
    ['Humans', e.Humans],
    ['Camping Plot', e.Camping_Plot],
    ['Weather', e.Weather],
  ].filter(([,v]) => v);

  const weather = [
    ['Condition', e.Weather_Auto],
    ['Temperature', e.Temp_C ? e.Temp_C + '°C' : ''],
    ['Feels like', e.Feels_C ? e.Feels_C + '°C' : ''],
    ['Wind', e.Wind_ms ? e.Wind_ms + ' m/s' : ''],
    ['Precip', e.Precip_mm ? e.Precip_mm + ' mm' : ''],
  ].filter(([,v]) => v);

  let html = '';

  // Wind comparison
  if (e.Wind_ms || e.Wind_Scale) {
    html += `<div class="detail-section"><h3>Wind</h3>
      <div class="detail-comparison">
        ${e.Wind_ms ? `<div class="detail-comp-row forecasted"><span class="dc-label">📡 Forecasted</span><span class="dc-val">${e.Wind_ms} m/s${e.Wind_ms ? ' — ' + windBeaufort(e.Wind_ms) : ''}</span></div>` : ''}
        ${e.Wind_Scale ? `<div class="detail-comp-row perceived"><span class="dc-label">🧍 Perceived</span><span class="dc-val">${scaleLabel('Wind_Scale', e.Wind_Scale)}</span></div>` : ''}
      </div>
    </div>`;
  }

  // Weather comparison
  if (e.Weather_Auto || e.Weather || e.Temp_C) {
    html += `<div class="detail-section"><h3>Weather</h3>
      <div class="detail-comparison">
        <div class="detail-comp-row forecasted">
          <span class="dc-label">📡 Forecasted</span>
          <span class="dc-val">${[e.Weather_Auto, e.Temp_C?e.Temp_C+'°C':'', e.Feels_C?'feels '+e.Feels_C+'°C':'', e.Precip_mm?e.Precip_mm+'mm precip':''].filter(Boolean).join(' · ')}</span>
        </div>
        ${e.Weather ? `<div class="detail-comp-row perceived"><span class="dc-label">🧍 Perceived</span><span class="dc-val">${e.Weather}${e.Cold?' · Cold: '+scaleLabel('Cold',e.Cold):''}</span></div>` : ''}
      </div>
    </div>`;
  }

  if (physical.length) {
    html += `<div class="detail-section"><h3>Physical State</h3><div class="detail-grid">`;
    physical.forEach(([l,v,isScale,key]) => html += detailRow(l,v,isScale,key));
    html += `</div></div>`;
  }

  if (environment.length) {
    html += `<div class="detail-section"><h3>Environment</h3><div class="detail-grid">`;
    environment.forEach(([l,v]) => html += detailRow(l,v,false));
    html += `</div></div>`;
  }

  // Custom fields
  const knownKeys = new Set(['Timestamp','Date','Time','Latitude','Longitude','GPS_Acc_m','Weather_Auto','Temp_C','Feels_C','Wind_ms','Precip_mm','Note','_synced','Tiredness','Sleep_Quality','Cold','Solitude','Trolley','Wind_Scale','Hunger','Thirst','Trance','Mental_Loop','Skin','Pace','Pain','Terrain','Animals','Humans','Camping_Plot','Weather']);
  const custom = Object.entries(e).filter(([k,v]) => v && !knownKeys.has(k));
  if (custom.length) {
    html += `<div class="detail-section"><h3>Custom Fields</h3><div class="detail-grid">`;
    custom.forEach(([k,v]) => html += detailRow(k.replace(/_/g,' '),v,false));
    html += `</div></div>`;
  }

  if (e.Note) {
    html += `<div class="detail-section"><h3>Note</h3><div style="font-size:15px;font-style:italic;line-height:1.6;color:var(--ink)">${e.Note}</div></div>`;
  }

  if (e.Latitude && e.Longitude) {
    const lat = parseFloat(e.Latitude).toFixed(5);
    const lon = parseFloat(e.Longitude).toFixed(5);
    html += `<div class="detail-section"><h3>Location</h3>
      ${e.GPS_Acc_m ? `<div class="detail-row"><span class="d-label">Accuracy</span><span class="d-val">±${e.GPS_Acc_m}m</span></div>` : ''}
      <div style="margin-top:10px"><a href="https://maps.google.com/?q=${lat},${lon}" target="_blank" style="color:var(--accent);font-size:14px;font-family:var(--font-serif)">📍 Open this location in Google Maps →</a></div>
    </div>`;
  }

  body.innerHTML = html;
  modal.classList.add('open');

  // Pan map to this entry
  if (e.Latitude && e.Longitude) {
    map.setView([parseFloat(e.Latitude), parseFloat(e.Longitude)], 14);
  }
}

function detailRow(label, val, isScale, fieldKey) {
  let valHTML = val || '—';
  if (isScale && fieldKey && !isNaN(parseInt(val))) {
    valHTML = renderScaleIcons(fieldKey, val);
  }
  return `<div class="detail-row"><span class="d-label">${label}</span><span class="d-val">${valHTML}</span></div>`;
}

function closeDetail(event) {
  if (event.target === document.getElementById('detail-modal')) closeModal();
}
function closeModal() { document.getElementById('detail-modal').classList.remove('open'); }

// ── HELPERS ────────────────────────────────────────────
function getWeatherIcon(w) {
  if (!w) return '🌡️';
  const s = w.toLowerCase();
  if (s.includes('sun') || s.includes('clear')) return '☀️';
  if (s.includes('storm') || s.includes('thunder')) return '⛈️';
  if (s.includes('snow')) return '❄️';
  if (s.includes('rain') || s.includes('drizzle') || s.includes('shower')) return '🌧️';
  if (s.includes('fog') || s.includes('mist')) return '🌫️';
  if (s.includes('cloud') || s.includes('overcast')) return '☁️';
  if (s.includes('partly')) return '⛅';
  if (s.includes('wind')) return '🌬️';
  return '🌤️';
}

function formatDate(dateStr) {
  try {
    const parts = dateStr.split('/');
    if (parts.length === 3) {
      // DD/MM/YYYY
      const d = new Date(parts[2], parts[1]-1, parts[0]);
      return d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    }
    return new Date(dateStr).toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  } catch(e) { return dateStr; }
}

function setLiveStatus(s) {
  const dot = document.getElementById('live-dot');
  const lbl = document.getElementById('live-label');
  if (s === 'ok') { dot.className = 'live-dot ok'; lbl.textContent = 'Live'; }
  else if (s === 'loading') { dot.className = 'live-dot'; lbl.textContent = 'Loading…'; }
  else { dot.className = 'live-dot'; lbl.textContent = 'Error'; }
}

function hideLoading(msg) {
  const screen = document.getElementById('loading-screen');
  if (msg) document.getElementById('loading-msg').textContent = msg;
  setTimeout(() => screen.classList.add('gone'), msg ? 2000 : 800);
}
