<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Of Walking on Foot — Radial Field Diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f2ede3;
  --ink: #2a2118;
  --muted: #8a7a68;
  --border: #c8b99a;
  --warm1: #d4956a;   /* sleep — terracotta */
  --warm2: #b07a52;   /* tiredness — umber */
  --warm3: #7a9aaa;   /* cold — slate blue */
  --warm4: #9ab0b8;   /* wind — pale blue */
  --warm5: #8a7a5a;   /* solitude — earth */
  --warm6: #c4a068;   /* trolley — ochre */
  --warm7: #a07848;   /* pace — sienna */
  --warm8: #6a8a5a;   /* terrain — moss */
  --warm9: #c06050;   /* pain — clay red */
  --warm10: #88a8b8;  /* weather — sky */
  --warm11: #b8a888;  /* note — sand */
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 100;
}

/* HEADER */
header {
  width: 100%;
  padding: 32px 40px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

header h1 {
  font-size: 28px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.01em;
}

header h1 strong {
  font-style: normal;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
}

#status-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: right;
}

/* LEGEND */
#legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
  padding: 16px 40px;
  border-bottom: 1px solid var(--border);
  width: 100%;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* CANVAS AREA */
#canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 20px 40px;
  width: 100%;
}

canvas {
  max-width: 100%;
  max-height: 85vh;
}

/* LOADING */
#loading {
  position: fixed;
  inset: 0;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 200;
  transition: opacity 0.6s;
}
#loading.gone { opacity: 0; pointer-events: none; }
#loading h2 { font-size: 24px; font-weight: 300; font-style: italic; }
#loading p { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.load-bar { width: 180px; height: 1px; background: var(--border); position: relative; overflow: hidden; }
.load-fill { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--ink); animation: slide 1.4s ease-in-out infinite; }
@keyframes slide { to { left: 100%; } }

/* FOOTER */
footer {
  width: 100%;
  padding: 12px 40px;
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--border);
  text-align: center;
}
</style>
</head>
<body>

<div id="loading">
  <h2>Of Walking on Foot</h2>
  <p>Composing the field diary…</p>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<header>
  <h1><strong>Radial Field Diary</strong>Of Walking on Foot — Iceland</h1>
  <div id="status-line">Loading…</div>
</header>

<div id="legend"></div>

<div id="canvas-wrap">
  <canvas id="dial" width="900" height="900"></canvas>
</div>

<footer>Of Walking on Foot · Dario J Laganà · Iceland 2025 · Each wedge = one day · Each ring = one field</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCXCLzZy5wWJRXZ0AxDVilpS6wbs89MNFw0hxtIyVi_8y6t5m-1qL9I24xqBks8G3JMNZY1B_sAoAX/pub?output=csv';
const TOTAL_DAYS = 90;

// Ring definitions — center → outside
const RINGS = [
  { key: 'Sleep_Quality', label: 'Sleep',    color: '#d4956a', type: 'scale' },
  { key: 'Tiredness',     label: 'Tiredness',color: '#b07a52', type: 'scale' },
  { key: 'Cold',          label: 'Cold',     color: '#7a9aaa', type: 'scale' },
  { key: 'Wind_Scale',    label: 'Wind',     color: '#9ab0b8', type: 'scale' },
  { key: 'Solitude',      label: 'Solitude', color: '#8a7a5a', type: 'scale' },
  { key: 'Trolley',       label: 'Trolley',  color: '#c4a068', type: 'scale' },
  { key: 'Pace',          label: 'Pace',     color: '#a07848', type: 'text'  },
  { key: 'Terrain',       label: 'Terrain',  color: '#6a8a5a', type: 'text'  },
  { key: 'Pain',          label: 'Pain',     color: '#c06050', type: 'text'  },
  { key: 'Weather',       label: 'Weather',  color: '#88a8b8', type: 'text'  },
  { key: 'Note',          label: 'Note',     color: '#b8a888', type: 'text'  },
];

const PACE_SCALE = { 'Low': 1, 'Medium': 2, 'High': 3, 'Suffering': 4, 'Hype': 5 };
const WEATHER_SCALE = { 'Sun': 5, 'Partly Cloudy': 4, 'Cloud': 3, 'Rain': 2, 'Storm': 1, 'Fog': 2, 'Snow': 2, 'Windy': 3 };

// ── DATA ────────────────────────────────────────────────
function toFloat(v) { return parseFloat(String(v||'').replace(',','.')); }

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  }).filter(e => e.Timestamp || e.Date);
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

function groupByDay(entries) {
  const byDay = {};
  entries.forEach(e => {
    const day = e.Date || (e.Timestamp||'').split('T')[0] || 'Unknown';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(e);
  });
  return Object.keys(byDay).sort().map(d => ({ date: d, entries: byDay[d] }));
}

// For each day, compute a single value per ring (average if multiple entries)
function dayValue(day, ring) {
  const entries = day.entries;
  if (ring.type === 'scale') {
    const vals = entries.map(e => {
      const v = parseFloat(e[ring.key]);
      return isNaN(v) ? null : v;
    }).filter(v => v !== null);
    if (!vals.length) return null;
    return vals.reduce((a,b) => a+b, 0) / vals.length;
  }
  if (ring.key === 'Pace') {
    const vals = entries.map(e => PACE_SCALE[e[ring.key]]).filter(Boolean);
    if (!vals.length) return null;
    return vals.reduce((a,b) => a+b, 0) / vals.length;
  }
  if (ring.key === 'Weather') {
    const vals = entries.map(e => {
      const w = e['Weather'] || e['Weather_Auto'] || '';
      for (const [k,v] of Object.entries(WEATHER_SCALE)) {
        if (w.toLowerCase().includes(k.toLowerCase())) return v;
      }
      return null;
    }).filter(v => v !== null);
    if (!vals.length) return null;
    return vals.reduce((a,b) => a+b, 0) / vals.length;
  }
  if (ring.key === 'Terrain') {
    // Has data or not (1 or 0)
    return entries.some(e => e.Terrain && e.Terrain.trim()) ? 1 : null;
  }
  if (ring.key === 'Pain') {
    return entries.some(e => e.Pain && e.Pain.trim()) ? 1 : null;
  }
  if (ring.key === 'Note') {
    return entries.some(e => e.Note && e.Note.trim().length > 0) ? 1 : null;
  }
  return null;
}

// ── DRAWING ─────────────────────────────────────────────
function draw(days) {
  const canvas = document.getElementById('dial');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  // Layout
  const innerR = 52;      // center circle radius
  const outerR = W * 0.46; // outer edge
  const ringW = (outerR - innerR) / RINGS.length;
  const gapAngle = 0.008; // radians gap between wedges

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#f2ede3';
  ctx.fillRect(0, 0, W, H);

  // Draw subtle concentric ring guides
  for (let r = 0; r <= RINGS.length; r++) {
    const radius = innerR + r * ringW;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,160,130,0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw wedge separators (radial lines for each day slot)
  const wedgeAngle = (Math.PI * 2) / TOTAL_DAYS;
  for (let d = 0; d < TOTAL_DAYS; d++) {
    const angle = -Math.PI / 2 + d * wedgeAngle;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
    ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
    ctx.strokeStyle = 'rgba(180,160,130,0.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Draw data for each day
  days.forEach((day, dayIdx) => {
    if (dayIdx >= TOTAL_DAYS) return;

    const startAngle = -Math.PI / 2 + dayIdx * wedgeAngle + gapAngle;
    const endAngle = -Math.PI / 2 + (dayIdx + 1) * wedgeAngle - gapAngle;

    RINGS.forEach((ring, ringIdx) => {
      const rInner = innerR + ringIdx * ringW;
      const rOuter = innerR + (ringIdx + 1) * ringW;
      const rMid = (rInner + rOuter) / 2;

      const val = dayValue(day, ring);
      if (val === null) return;

      // Normalize to 0–1
      const norm = ring.key === 'Terrain' || ring.key === 'Pain' || ring.key === 'Note'
        ? 1
        : Math.min(val / 5, 1);

      // Draw filled arc segment
      const col = hexToRgba(ring.color, 0.12 + norm * 0.55);
      ctx.beginPath();
      ctx.arc(cx, cy, rOuter - 1, startAngle, endAngle);
      ctx.arc(cx, cy, rInner + 1, endAngle, startAngle, true);
      ctx.closePath();
      ctx.fillStyle = col;
      ctx.fill();

      // Draw dots along the ring based on value
      const dotCount = ring.key === 'Terrain' || ring.key === 'Pain' || ring.key === 'Note'
        ? 1 : Math.round(norm * 5);

      if (dotCount > 0) {
        const midAngle = (startAngle + endAngle) / 2;
        const spread = (endAngle - startAngle) * 0.75;

        for (let d = 0; d < dotCount; d++) {
          const t = dotCount === 1 ? 0.5 : d / (dotCount - 1 || 1);
          const angle = midAngle - spread/2 + t * spread;

          // Vary dot position radially slightly for organic feel
          const rPos = rInner + ringW * (0.3 + 0.4 * Math.sin(d * 2.1 + ringIdx));

          const x = cx + Math.cos(angle) * rPos;
          const y = cy + Math.sin(angle) * rPos;

          const dotR = ringW < 18 ? 1.8 : 2.4;
          ctx.beginPath();
          ctx.arc(x, y, dotR, 0, Math.PI * 2);
          ctx.fillStyle = hexToRgba(ring.color, 0.85);
          ctx.fill();
        }
      }

      // Draw thin arc border on outer edge of ring if has data
      if (norm > 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, rOuter - 1, startAngle, endAngle);
        ctx.strokeStyle = hexToRgba(ring.color, 0.5);
        ctx.lineWidth = norm > 0.6 ? 1.5 : 0.8;
        ctx.stroke();
      }
    });

    // Day number label for every 10th day
    if ((dayIdx + 1) % 10 === 0 || dayIdx === 0) {
      const labelAngle = -Math.PI / 2 + (dayIdx + 0.5) * wedgeAngle;
      const labelR = outerR + 14;
      const lx = cx + Math.cos(labelAngle) * labelR;
      const ly = cy + Math.sin(labelAngle) * labelR;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(labelAngle + Math.PI / 2);
      ctx.fillStyle = '#8a7a68';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(dayIdx + 1, 0, 0);
      ctx.restore();
    }
  });

  // Draw "empty" future day outlines
  for (let d = days.length; d < TOTAL_DAYS; d++) {
    const startAngle = -Math.PI / 2 + d * wedgeAngle + gapAngle;
    const endAngle = -Math.PI / 2 + (d + 1) * wedgeAngle - gapAngle;

    ctx.beginPath();
    ctx.arc(cx, cy, outerR - 1, startAngle, endAngle);
    ctx.arc(cx, cy, innerR + 1, endAngle, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = 'rgba(180,160,130,0.04)';
    ctx.fill();
  }

  // Ring labels (on the right side, at 3 o'clock)
  RINGS.forEach((ring, ringIdx) => {
    const rMid = innerR + (ringIdx + 0.5) * ringW;
    const lx = cx + rMid + 2;
    const ly = cy;
    ctx.save();
    ctx.fillStyle = ring.color;
    ctx.font = `${Math.max(7, Math.min(10, ringW * 0.55))}px JetBrains Mono`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    // Only draw if ring is wide enough
    if (ringW > 12) {
      ctx.globalAlpha = 0.7;
      ctx.fillText(ring.label.toUpperCase(), lx, ly);
    }
    ctx.restore();
  });

  // Center circle
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
  gradient.addColorStop(0, '#e8dcc8');
  gradient.addColorStop(1, '#d4c4a8');
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,150,110,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Center text
  ctx.fillStyle = '#5a4a38';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'italic 11px Cormorant Garamond';
  ctx.fillText('Of Walking', cx, cy - 8);
  ctx.fillText('on Foot', cx, cy + 8);

  // Outer border ring
  ctx.beginPath();
  ctx.arc(cx, cy, outerR + 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(180,150,110,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // North marker (day 1)
  const markerAngle = -Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(markerAngle) * (outerR + 6), cy + Math.sin(markerAngle) * (outerR + 6));
  ctx.lineTo(cx + Math.cos(markerAngle) * (outerR + 20), cy + Math.sin(markerAngle) * (outerR + 20));
  ctx.strokeStyle = 'rgba(160,130,100,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#8a7a68';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('DAY 1', cx, cy - outerR - 28);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── LEGEND ──────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  RINGS.forEach(ring => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${ring.color}"></div>${ring.label}`;
    el.appendChild(item);
  });
}

// ── INIT ────────────────────────────────────────────────
async function init() {
  buildLegend();
  try {
    const url = SHEET_URL + '&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    const entries = parseCSV(csv);
    const days = groupByDay(entries);

    document.getElementById('status-line').textContent =
      `${days.length} days recorded · ${entries.length} entries · ${TOTAL_DAYS - days.length} days remaining`;

    draw(days);
  } catch(e) {
    document.getElementById('status-line').textContent = '⚠ ' + e.message;
    draw([]); // draw empty circle
  }

  setTimeout(() => document.getElementById('loading').classList.add('gone'), 800);
}

window.addEventListener('load', init);
</script>
</body>
</html>
